name: Déployer sur GitHub Pages

# Publie le site statique à chaque push sur la branche de travail,
# et régénère les media kits toutes les heures pour publier
# automatiquement la page de toute nouvelle créatrice ajoutée dans l'app.
on:
  push:
    branches:
      - claude/agency-website-m3e282
      - main
  schedule:
    # Toutes les heures à :17 (créneau peu congestionné → plus fiable que :00).
    - cron: "17 * * * *"
  workflow_dispatch:

# Permissions requises par le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois, sans annuler celle en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer les pages media kit (1 par créatrice, données live)
        # Régénère mediakit/<slug>/index.html depuis public_mediakit (anon).
        # continue-on-error : un hoquet réseau Supabase ne doit jamais bloquer
        # le déploiement du reste du site (on retombe alors sur les shells commités).
        continue-on-error: true
        run: python3 mediakit/_build_mediakits.py

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer l'artifact (racine du site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
