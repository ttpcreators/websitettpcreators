name: Déployer sur GitHub Pages

# Publie le site statique à chaque push sur la branche de travail,
# et régénère les media kits toutes les heures pour publier
# automatiquement la page de toute nouvelle créatrice ajoutée dans l'app.
on:
  push:
    branches:
      - claude/agency-website-m3e282
      - main
  schedule:
    # Toutes les heures à :17 (créneau peu congestionné → plus fiable que :00).
    - cron: "17 * * * *"
  workflow_dispatch:

# Permissions requises par le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois, sans annuler celle en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer les pages media kit (1 par créatrice, données live)
        # Régénère mediakit/<slug>/index.html depuis public_mediakit (anon).
        # continue-on-error : un hoquet réseau Supabase ne doit jamais bloquer
        # le déploiement du reste du site (on retombe alors sur les shells commités).
        continue-on-error: true
        run: python3 mediakit/_build_mediakits.py

      - name: Rendre chaque media kit en PDF paysage 16:9 (Chrome headless)
        # Génère mediakit/<slug>/media-kit.pdf (téléchargement direct 1 clic).
        # Chrome est préinstallé sur ubuntu-latest. continue-on-error + le repli
        # window.print() côté page garantissent que rien ne bloque le déploiement.
        continue-on-error: true
        run: python3 mediakit/_render_pdfs.py

      - name: Garde-fou — le site officiel est la version BLANCHE (jamais la refonte cinématique)
        # La version blanche n'utilise AUCUNE balise <video>. L'ancienne refonte
        # « cinématique » (fond noir) en contient une. Si index.html en contient
        # une, c'est une régression → on BLOQUE le déploiement (jamais publié).
        run: |
          if grep -qiE "<video" index.html; then
            echo "::error::index.html contient une balise <video> = ancienne refonte cinématique (fond noir). Le site officiel est la version BLANCHE. Déploiement BLOQUÉ."
            exit 1
          fi
          echo "OK — index.html est bien la version blanche (aucune balise vidéo)."

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer l'artifact (racine du site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
