name: Déployer sur GitHub Pages

# Publie le site statique à chaque push sur la branche de travail.
on:
  push:
    branches:
      - claude/agency-website-m3e282
      - main
  workflow_dispatch:

# Permissions requises par le déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois, sans annuler celle en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer l'artifact (racine du site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v5
