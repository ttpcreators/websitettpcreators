  :root {
    --deep: #3d0000;          /* bordeaux profond (sections sombres) */
    --wine: #4d0a12;          /* bordeaux des grands titres sur blanc */
    --rose: #e39aa8;          /* accent rosé, très parcimonieux */
    --ink: #1c1517;           /* quasi-noir chaud (texte sur blanc) */
    --muted: #8f868a;         /* gris chaud (labels) */
    --line: #e7dede;          /* filets clairs */
    --track: #ece3e3;         /* fond des barres */
    --paper: #ffffff;
    --on-deep: #f4ecec;
    --on-deep-muted: rgba(244, 236, 236, .52);
    --on-deep-line: rgba(244, 236, 236, .16);

    --mono: ui-monospace, "SF Mono", "SFMono-Regular", "Cascadia Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --display: "Anton", "Arial Narrow", "Helvetica Neue Condensed", Impact, sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #201013;
    color: var(--ink);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .kit {
    width: 100%;
    background: var(--paper);
  }

  /* ---------- primitives ---------- */
  .eyebrow {
    font-family: var(--mono);
    font-size: .72rem;
    letter-spacing: .34em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0;
  }
  .display {
    font-family: var(--display);
    font-weight: 400;
    letter-spacing: .01em;
    line-height: .9;
    text-transform: uppercase;
    text-wrap: balance;
    margin: 0;
  }
  .rule {
    height: 2px;
    background: var(--wine);
    border: 0;
    flex: 1;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  /* ======================================================= SECTION 1 — HERO */
  .hero {
    background: var(--deep);
    color: var(--on-deep);
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    min-height: 100vh;
  }
  .hero-text {
    padding: clamp(2rem, 5vw, 4.5rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1.6rem;
  }
  .hero .eyebrow { color: var(--on-deep-muted); }
  .hero-name {
    font-size: clamp(3.6rem, 11vw, 8.4rem);
    color: #fff;
  }
  .hero-handle {
    font-size: 1rem;
    letter-spacing: .12em;
    color: var(--on-deep);
    width: fit-content;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--rose);
    text-decoration: none;
    transition: color .15s ease;
  }
  a.hero-handle:hover { color: #fff; }
  a.contact-link { text-decoration: none; transition: color .15s ease; }
  a.contact-link:hover { color: #fff; }
  .hero-bio {
    max-width: 42ch;
    display: flex;
    flex-direction: column;
    gap: 1.05rem;
  }
  .hero-bio p {
    margin: 0;
    font-size: .95rem;
    line-height: 1.72;
    color: var(--on-deep);
  }
  .tags { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .3rem; }
  .tag {
    font-family: var(--mono);
    font-size: .68rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--on-deep);
    padding: .62rem .95rem;
    border: 1px solid var(--on-deep-line);
    border-radius: 2px;
  }

  .hero-media { position: relative; overflow: hidden; }
  .photo {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 70% 20%, rgba(227,154,168,.12), transparent 60%),
      linear-gradient(150deg, #5a1119 0%, #2c0709 100%);
    display: grid;
    place-items: center;
  }
  .photo::after {
    content: "";
    position: absolute;
    inset: clamp(14px, 2vw, 26px);
    border: 1px solid rgba(244, 236, 236, .28);
    pointer-events: none;
  }
  .photo-note {
    font-family: var(--mono);
    font-size: .66rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(244, 236, 236, .5);
    text-align: center;
    padding: 0 1rem;
    line-height: 2;
  }
  .photo-badge {
    position: absolute;
    left: clamp(14px, 2vw, 26px);
    bottom: clamp(14px, 2vw, 26px);
    z-index: 2;
    background: var(--deep);
    color: var(--on-deep);
    font-size: .64rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    padding: .6rem 1rem;
  }

  /* ======================================================= WHITE SECTIONS */
  .sheet { padding: clamp(2.4rem, 5.5vw, 6rem) clamp(1.6rem, 6vw, 8rem); }
  .sec-head { display: flex; flex-direction: column; gap: 1rem; margin-bottom: clamp(2rem, 4vw, 3.2rem); }
  .sec-titlerow { display: flex; align-items: center; gap: 1.6rem; }
  .sec-title { font-size: clamp(2.4rem, 6vw, 4.4rem); color: var(--wine); }
  .sec-tag {
    font-size: .68rem;
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ---- Section 2: audience ---- */
  .aud-grid {
    display: grid;
    grid-template-columns: 1fr 1.15fr 1fr;
    gap: clamp(1.6rem, 3vw, 3rem);
    align-items: start;
  }
  .aud-col { display: flex; flex-direction: column; gap: 1.5rem; }
  .col-label {
    font-size: .7rem;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 700;
    margin: 0 0 .2rem;
  }
  .bars { display: flex; flex-direction: column; gap: .95rem; }
  .bar-row { display: grid; grid-template-columns: 1fr 84px auto; align-items: center; gap: .7rem; }
  .bar-name { font-size: .8rem; color: var(--ink); }
  .bar-track { height: 7px; background: var(--track); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--wine); border-radius: 999px; }
  .bar-val { font-size: .82rem; font-weight: 700; color: var(--ink); text-align: right; }

  .mid { border-left: 1px solid var(--line); border-right: 1px solid var(--line); padding: 0 clamp(1rem, 2.4vw, 2.4rem); align-items: center; text-align: center; }
  .big-stat { font-family: var(--display); font-size: clamp(2.6rem, 6vw, 4.2rem); color: var(--wine); line-height: 1; }
  .stat-cap { font-size: .82rem; color: var(--ink); margin-top: .35rem; }
  .donut { width: min(230px, 62vw); height: auto; margin: .4rem auto 0; display: block; }
  .legend { display: flex; flex-direction: column; gap: .55rem; align-items: flex-start; margin: .4rem auto 0; width: fit-content; }

        : "";
      var tris = lay.tris.map(function (t) {
        return '<div class="tri"><div class="tri-num tnum">' + val(p[t[1]]) + '</div><div class="tri-cap">' + esc(t[0]) + "</div></div>";
      }).join("");
      var rows = lay.rows.map(function (r) {
        return '<div class="plat-row"><span class="plat-row-label">' + esc(r[0]) + '</span><span class="plat-row-val tnum">' + val(p[r[1]]) + "</span></div>";
      }).join("");
      var photo = data.photos && data.photos[p.key];
      var phone = photo
        ? '<div class="phone"><div class="phone-screen"><img src="' + esc(photo) + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:30px"></div></div>'
        : '<div class="phone"><div class="phone-screen"><span>Capture profil<br>' + esc(PLAT_LABEL[p.key] || p.key) + "</span></div></div>";
      return '<section class="sheet platform">' + head +
        '<div class="plat-grid" data-reveal><div>' +
        '<p class="plat-kicker">Plateforme ' + zero(i + 1) + " / " + zero(n) + "</p>" +
        '<div class="plat-name">' + esc(PLAT_LABEL[p.key] || p.key) + "</div>" +
        '<p class="plat-intro">' + esc(PLAT_INTRO[p.key] || "") + "</p>" +
        '<div class="plat-tris">' + tris + '</div><div class="plat-rows">' + rows + "</div></div>" +
        '<div class="plat-media phone-wrap">' + phone + "</div></div></section>";
    }).join("");
  }

  function buildBrands(data) {
    var brands = data.brands || [];
    if (!brands.length) return "";
    var cells = brands.map(function (b) {
      var inner = b.logo ? '<img src="' + esc(b.logo) + '" alt="' + esc(b.name) + '" style="max-height:60%;max-width:75%;object-fit:contain">' : "<span>" + esc(b.name) + "</span>";
      return '<div class="logo-cell">' + inner + "</div>";
    }).join("");
    return '<section class="sheet brands"><div class="sec-head" data-reveal>' +
      '<p class="eyebrow">( 04 ) — Preuves sociales</p><div class="sec-titlerow">' +
      '<h2 class="display sec-title">Ces marques ont<br>fait confiance à ' + esc(firstName(data.name)) + "</h2>" +
      '<hr class="rule"><span class="sec-tag">' + brands.length + " Collaboration" + (brands.length > 1 ? "s" : "") + "</span></div></div>" +
      '<div class="logo-grid" data-reveal>' + cells + "</div></section>";
  }

  function buildContact(data) {
    return '<section class="contact"><div class="contact-text" data-reveal>' +
      '<p class="eyebrow">( 05 ) — Contact</p><h2 class="display contact-title">Let\'s<br>Work !</h2>' +
      '<div class="contact-block"><span class="k">Social Media</span><a class="v contact-link" href="https://instagram.com/ttpcreators" target="_blank" rel="noreferrer">@ttpcreators</a></div>' +
      '<div class="contact-block"><span class="k">Mobile</span><a class="v contact-link tnum" href="tel:+33766259803">07 66 25 98 03</a></div>' +
      '<div class="contact-block"><span class="k">Email</span><a class="v contact-link" href="mailto:partnerships@ttpcreators.pro">partnerships@ttpcreators.pro</a></div>' +
      '<a class="send" href="mailto:partnerships@ttpcreators.pro?subject=' + encodeURIComponent("Collaboration avec " + data.name) + '">Envoyer</a></div>' +
      '<div class="contact-media hero-media">' + photoBox(data.photos && data.photos.contact, "Portrait secondaire<br>— ta photo ici —", false) + "</div>" +
      '<div class="footer"><div>TTP Creators — Talent management stratégique</div>' +
      '<div>Media Kit · ' + esc(data.name) + ' · <span class="js-month">' + monthFR() + "</span></div></div></section>";
  }

  function firstName(name) { return String(name || "").trim().split(/\s+/)[0] || ""; }
  function zero(n) { return (n < 10 ? "0" : "") + n; }

  function build(data) {
    return buildHero(data) + buildAudience(data) + buildPlatforms(data) + buildBrands(data) + buildContact(data);
  }

  // ---- Rendu + effets --------------------------------------------------------
  var kit = document.getElementById("kit");
  var _io = null;
  function wireReveals(animate) {
    var els = kit.querySelectorAll("[data-reveal]");
    if (_io) { _io.disconnect(); _io = null; }
    if (!animate || reduce || !("IntersectionObserver" in window)) {
      els.forEach(function (e) { e.classList.add("in"); });
      return;
    }
    _io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("in"); _io.unobserve(e.target); } });
    }, { rootMargin: "0px 0px -8% 0px", threshold: 0.08 });
    els.forEach(function (e) { _io.observe(e); });
  }
  function paint(data, animate) {
    kit.innerHTML = build(data);
    document.title = "Media Kit — " + data.name + " · TTP Creators";
    wireReveals(animate);
  }

  // Barre de progression
  var bar = document.getElementById("progress");
  function onScroll() {
    var h = d.scrollHeight - d.clientHeight, top = d.scrollTop || document.body.scrollTop || 0;
    if (bar) bar.style.width = (h > 0 ? (top / h) * 100 : 0) + "%";
  }
  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll);

  // 1) Rendu immédiat (repli) → la page est belle tout de suite
  paint(DEFAULT, true);
  onScroll();

  // 2) Fetch des données réelles → re-render si présentes
  var slug = (window.MK_SLUG || (location.pathname.match(/mediakit\/([^/]+)/) || [])[1] || DEFAULT.slug).toLowerCase();
  try {
    fetch(SB_URL + "/rest/v1/public_mediakit?select=name,handle,niche,platform,photo_url,mediakit&mediakit->>slug=eq." + encodeURIComponent(slug), {
      headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY },
    })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (rows) {
        if (rows && rows.length && rows[0].mediakit) { paint(merge(DEFAULT, rows[0]), false); onScroll(); }
      })
      .catch(function () { /* repli déjà affiché */ });
  } catch (e) { /* repli déjà affiché */ }
})();

</script>
</body>
</html>
